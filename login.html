<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cyberztalk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006688",
                        "on-primary": "#ffffff",
                        "primary-container": "#00c2ff",
                        surface: "#faf8ff",
                        "on-surface": "#131b2e",
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary: #006688;
        }
    </style>
</head>
<body class="bg-surface">
    <div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary rounded-lg flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">C</span>
                </div>
                <h1 class="text-3xl font-bold text-on-surface">Cyberztalk</h1>
                <p class="text-on-surface text-sm mt-2">Welcome back. Sign in to your account</p>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-8">
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" name="email" placeholder="your@email.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Password <span class="text-red-500">*</span></label>
                        <input type="password" name="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="rememberMe" class="w-4 h-4">
                            <span class="text-on-surface">Remember me</span>
                        </label>
                        <a href="#" class="text-primary hover:text-on-surface">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-on-surface transition-colors">
                        Sign In
                    </button>
                </form>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-on-surface">Or continue with</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button type="button" class="border border-gray-300 rounded-lg py-3 font-medium text-on-surface hover:bg-surface transition-colors" onclick="handleSocialLogin('google')" title="Sign in with Google">
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Google
                        </span>
                    </button>

                    <button type="button" class="border border-gray-300 rounded-lg py-3 font-medium text-on-surface hover:bg-surface transition-colors" onclick="handleSocialLogin('facebook')" title="Sign in with Facebook">
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2">
                                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                            </svg>
                            Facebook
                        </span>
                    </button>

                    
                    

                    <button type="button" class="border border-gray-300 rounded-lg py-3 font-medium text-on-surface hover:bg-surface transition-colors" onclick="handleSocialLogin('microsoft')" title="Sign in with Microsoft">
                        <span class="flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="2" y="2" width="8" height="8" fill="#F25022"/>
                                <rect x="14" y="2" width="8" height="8" fill="#00A4EF"/>
                                <rect x="2" y="14" width="8" height="8" fill="#7FBA00"/>
                                <rect x="14" y="14" width="8" height="8" fill="#FFB900"/>
                            </svg>
                            Microsoft
                        </span>
                    </button>
                </div>

                <p class="text-center text-sm text-on-surface">
                    Don't have an account? 
                    <a href="get-started.html" class="text-primary font-semibold hover:text-on-surface">Sign up</a>
                </p>
            </div>

            <p class="text-center text-xs text-gray-500 mt-8">
                By signing in, you agree to our <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
            </p>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const form = document.getElementById('loginForm');
            const email = form.querySelector('input[name="email"]').value;
            const password = form.querySelector('input[name="password"]').value;
            const rememberMe = form.querySelector('input[name="rememberMe"]').checked;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Login successful!');
                    localStorage.setItem('authToken', result.data.token);
                    localStorage.setItem('currentUser', JSON.stringify(result.data.user));
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberMe', 'true');
                    }

                    if (result.data?.user?.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'victim-dashboard.html';
                    }
                } else {
                    alert(`Error: ${result.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during login. Please try again.');
            }
        }

        function handleSocialLogin(platform) {
            const platformNames = {
                'google': 'Google',
                'facebook': 'Facebook',
                'github': 'GitHub',
                'microsoft': 'Microsoft'
            };
            
            const platformName = platformNames[platform] || platform;
            
            // In a real implementation, you would redirect to OAuth providers
            // For now, show implementation guide
            const message = `${platformName} Sign-In Integration:
            
1. Register your app with ${platformName} OAuth
2. Get Client ID and Client Secret
3. Implement OAuth 2.0 flow
4. Redirect users to ${platformName} authorization endpoint
5. Exchange authorization code for access token
6. Create or update user account in Cyberztalk

Currently in demo mode. Click OK to see implementation details.`;
            
            alert(message);
        }

        // Attach form submission
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }

        // Restore remembered email
        window.addEventListener('load', () => {
            if (localStorage.getItem('rememberMe')) {
                const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
                const emailInput = document.querySelector('input[name="email"]');
                if (emailInput && user.email) {
                    emailInput.value = user.email;
                }
            }
        });
    </script>
