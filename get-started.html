<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Cyberztalk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006688",
                        "on-primary": "#ffffff",
                        "primary-container": "#00c2ff",
                        surface: "#faf8ff",
                        "on-surface": "#131b2e",
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --primary: #006688;
        }
    </style>
</head>
<body class="bg-surface">
    <div class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary rounded-lg flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl">C</span>
                </div>
                <h1 class="text-3xl font-bold text-on-surface">Create Account</h1>
                <p class="text-on-surface text-sm mt-2">Join Cyberztalk and get protected today</p>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-8">
                <form id="signupForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" name="fullName" placeholder="John Doe" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Email Address <span class="text-red-500">*</span></label>
                        <input type="email" name="email" placeholder="your@email.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Password <span class="text-red-500">*</span></label>
                        <input type="password" name="password" placeholder="Create a strong password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        <p class="text-xs text-on-surface mt-1">At least 8 characters with numbers and symbols</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-on-surface mb-2">Confirm Password <span class="text-red-500">*</span></label>
                        <input type="password" name="confirmPassword" placeholder="Confirm your password" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>

                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" name="agreeTerms" class="w-5 h-5 mt-1" required>
                        <span class="text-sm text-on-surface">I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a></span>
                    </label>

                    <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-on-surface transition-colors">
                        Create Account
                    </button>
                </form>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-outline"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-on-surface">Or sign up with</span>
                    </div>
                </div>

                <button class="w-full border border-gray-300 rounded-lg py-3 font-medium text-on-surface hover:bg-surface transition-colors" onclick="handleGoogleSignup()">
                    <span class="flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-lg">mail</span>
                        Google
                    </span>
                </button>

                <p class="text-center text-sm text-on-surface mt-6">
                    Already have an account? 
                    <a href="login.html" class="text-primary font-semibold hover:text-on-surface">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        async function handleSignup(event) {
            event.preventDefault();

            const form = document.getElementById('signupForm');
            const fullName = form.querySelector('input[name="fullName"]').value;
            const email = form.querySelector('input[name="email"]').value;
            const password = form.querySelector('input[name="password"]').value;
            const confirmPassword = form.querySelector('input[name="confirmPassword"]').value;

            // Validation
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fullName,
                        email,
                        password,
                        role: 'victim'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Account created successfully! Redirecting to login...');
                    localStorage.setItem('authToken', result.data.token);
                    window.location.href = 'index.html';
                } else {
                    alert(`Error: ${result.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during signup. Please try again.');
            }
        }

        function handleGoogleSignup() {
            alert('Google Sign-up is coming soon! Please use email signup for now.');
        }

        // Attach form submission
        const signupForm = document.getElementById('signupForm');
        if (signupForm) {
            signupForm.addEventListener('submit', handleSignup);
        }
    </script>
